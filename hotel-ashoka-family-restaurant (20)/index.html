<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link id="favicon" rel="icon" type="image/png" href="https://lh3.googleusercontent.com/d/1fl1_PwYstotCqSb26KCzcoIlMIMkTr86" />
    <script>
      (function() {
        const img = new Image();
        img.crossOrigin = 'anonymous';
        img.onload = function() {
          const canvas = document.createElement('canvas');
          canvas.width = 64;
          canvas.height = 64;
          const ctx = canvas.getContext('2d');
          // Draw circle and clip
          ctx.beginPath();
          ctx.arc(32, 32, 32, 0, Math.PI * 2, true);
          ctx.closePath();
          ctx.clip();
          // Draw the original image inside the circle
          ctx.drawImage(img, 0, 0, 64, 64);
          // Set it as favicon
          document.getElementById('favicon').href = canvas.toDataURL('image/png');
        };
        img.src = "https://lh3.googleusercontent.com/d/1fl1_PwYstotCqSb26KCzcoIlMIMkTr86";
      })();
    </script>
    <title>Hotel Ashoka</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
